<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QRESPONDER</title>
  <!-- All assets local. No CDN, no external fonts, no telemetry. -->
  <link rel="stylesheet" href="/tokens.css" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="shell">
    <nav id="rail" class="rail hidden" aria-label="Primary">
      <a class="rail-brand" title="QRESPONDER"><span class="logo" aria-hidden="true"></span></a>
      <div id="rail-items" class="rail-items"></div>
    </nav>
    <div class="main">
      <header class="topbar">
        <div id="ws-switcher" class="ws-switcher hidden"></div>
        <div class="topbar-right">
          <div id="model-status" class="model-status" title="Active model — server-side; your API key never reaches this page">
            <span class="ms-dot"></span><span class="ms-text">—</span>
          </div>
        </div>
      </header>
      <main id="app"><div class="loading"><span class="spinner"></span> Loading…</div></main>
      <footer class="appfoot">
        Local-first · binds 127.0.0.1 · no login · no telemetry · your data never leaves this machine.
      </footer>
    </div>
  </div>
  <script src="/app.js"></script>
</body>
</html>
