name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (with retrieval extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[anthropic,openai,retrieval,dev]"

      - name: Run test suite (offline, MockProvider — no network)
        run: pytest -q

      - name: Baseline eval against the golden set
        env:
          LLM_PROVIDER: mock
        run: qresponder eval --set eval.yaml --kb tests/fixtures/kb --qa qa.example.yaml

  docker:
    name: Build image + container smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: qresponder:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — the container serves /healthz and the UI
        run: |
          docker run -d --name qr -e LLM_PROVIDER=mock -p 8000:8000 qresponder:ci
          ok=0
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/healthz; then echo "healthz OK"; ok=1; break; fi
            sleep 2
          done
          docker logs qr
          test "$ok" = "1" || { echo "container never became healthy"; exit 1; }
          curl -sf http://127.0.0.1:8000/ | grep -qi qresponder && echo "index OK"
          docker rm -f qr
