name: Release

# Tag a version (vX.Y.Z) to build + publish the multi-arch image to GHCR and cut a
# GitHub Release with notes from the CHANGELOG.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push to GHCR

jobs:
  image:
    name: Build + push multi-arch image to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        # Prefers a PAT with write:packages (repo secret GHCR_PAT) so the FIRST publish
        # of the package can be created under the user namespace — the default
        # GITHUB_TOKEN can't create a brand-new user-owned package even with
        # packages:write. Falls back to GITHUB_TOKEN once the package already exists.
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/qresponder
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build + push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4
      - name: Create the release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            Container image: `docker pull ghcr.io/${{ github.repository_owner }}/qresponder:${{ github.ref_name }}`

            See CHANGELOG.md for details.
